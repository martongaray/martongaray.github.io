<!DOCTYPE html>

<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="text/javascript" language="javascript" src="assets/gwt/chessboard.nocache.js"></script>
    <title>Chess Board</title>
    <style>
        body {
            background-color: #dddddd;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        .center-div {
            width: 450px;
            height: 450px;
            background-color: #a87132;
            margin: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
        }

        .chessboard-div {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 400px;
            height: 400px;
        }
    </style>
</head>
<body>
<div class="center-div">
    <div id="ChessBoard" class="chessboard-div"></div>
</div>
</body>
</html>
