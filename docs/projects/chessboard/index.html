<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">

<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <title>Chess Board</title>
    <script type="text/javascript" language="javascript" src="assets/gwt/chessboard.nocache.js"></script>

    <style>
        body {
            background-color: #dddddd;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        .center-div {
            width: 450px;
            height: 450px;
            background-color: #a87132;
            margin: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
        }

        .chessboard-div {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 400px;
            height: 400px;
        }

    </style>

</head>
<body>
<div class="center-div">
    <div id="ChessBoard" class="chessboard-div"></div>
</div>
</body>
</html>
